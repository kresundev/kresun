name: kresun
description: "Kresun - Field data gathering app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.3

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Backend
  supabase_flutter: ^2.8.4
  firebase_core: ^3.13.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0

  # HTTP
  dio: ^5.8.0+1

  # File Picker
  image_picker: ^1.1.2
  file_picker: ^9.0.0

  # Utils
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
